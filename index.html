<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Wallet Demo</title>

<style>
body{
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
    text-align:center;
    margin:40px;
}
.card{
    max-width:700px;
    margin:auto;
    background:#1d1d1d;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(247,147,26,.3);
}
.logo{
    width:90px;
}
.wallet{
    background:#2a2a2a;
    padding:15px;
    border-radius:8px;
    word-break:break-all;
    font-family:monospace;
    margin:20px 0;
}
.balance{
    font-size:2.5em;
    color:#f7931a;
    font-weight:bold;
}
.note{
    color:#aaa;
    font-size:0.9em;
}
button{
    background:#f7931a;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}
button:hover{
    background:#d67f17;
}
</style>

<script>
function copyWallet(){
    navigator.clipboard.writeText("bc1q7r0uj2h9f48ew0kych5knsl343f8z4nqxkye23");
    alert("Wallet copied!");
}
</script>

</head>
<body>

<div class="card">

<img class="logo"
src="https://upload.wikimedia.org/wikipedia/commons/4/46/Bitcoin.svg"
alt="Bitcoin">

<h1>Bitcoin Wallet</h1>

<p>
Bitcoin is a decentralized digital currency that enables secure peer-to-peer
payments without a bank or central authority.
</p>

<div class="wallet">
bc1q7r0uj2h9f48ew0kych5knsl343f8z4nqxkye23
</div>

<button onclick="copyWallet()">Copy Wallet Address</button>

<h2>Wallet Balance</h2>

<div class="balance">16.99 BTC</div>

<p class="note">
Demo balance shown for design purposes only.
</p>

</div>

</body>
</html>
